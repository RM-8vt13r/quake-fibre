[TRANSCEIVER]
constellation:    QPSK  # Symbol constellation to use
power:            2     # Transmission power in dBm
baud_rate:        1e6   # Symbol rate in symbols / s
pulse:            RRCOS # Pulseshape for transmission, RRCOS or SINC
pulse_parameter:  0.5   # Parameter to pass to the transmission pulseshape (e.g. rolloff factor)
upsample_factor:  4     # Samples per symbol
filter:           RRCOS # Pulseshape for receiver-side antialiasing, RRCOS or SINC
filter_parameter: 0.5   # Parameter to pass to the antialiasing pulseshape (e.g. rolloff factor)

[FIBRE]
section_length:    0.1  # Correlation length in km
section_count:     1000 # Number of fibre sections, each of which has length length_correlation
PMD_parameter:     0.1  # Polarisation mode dispersion parameter in ps / (km ^ 0.5)
realisation_count: 1000 # Number of fibre realisations to simulate simultaneously
photoelasticity:   0.1  # Photoelasticity, which relates material strain to optical strain

[SIGNAL]
batch_size: 1    # Number of signals to transmit simultaneously
symbol_count: 20 # Number of symbols to transmit
