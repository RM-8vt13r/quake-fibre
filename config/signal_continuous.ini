[SIGNAL]
batch_size:   1    # The number of signals to transmit simultaneously
symbol_count: 2    # The number of symbols to transmit per signal
carrier:      1550 # Signal carrier wavelength in nm
transmission_start: -500 # Time in seconds after the earthquake starts, at which to start transmitting signals
transmission_stop: 3000  # Time in seconds after the earthquake starts, at which to stop transmitting signals
transmission_step: 0.05  # Interval in seconds between signal transmissions
