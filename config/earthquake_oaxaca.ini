[EARTHQUAKE]
event:         GCMT:202006231529A # Largest earthquake near the cable during Zhan et al.'s measurements, magnitude 7.4 near Oaxaca, Mexico
step_length:   1                  # Distances at which to request seismograms in km; these seismograms are interpolated to all fibre section 
duration:      3000               # How many seconds of seismogram to synthesise from the earthquake origin
model:         ak135f_5s          # Earth model for Syngine to use from https://ds.iris.edu/ds/products/syngine/#earth
batch_size:    4                  # How many seismograms to request from Syngine simultaneously
worker_count:  5                  # How many threads to start that request seismograms from Syngine in parallel (guidelines at https://ds.iris.edu/ds/nodes/dmc/services/usage/)
request_delay: 0.1                # Minimum delay between filing concurrent seismogram requests (guidelines at https://ds.iris.edu/ds/nodes/dmc/services/usage/)
water_density: 1045               # Water density at the seafloor in kg / m3
water_depth:   4000               # Depth of the sea in m
water_sound_velocity: 1500        # Speed of sound through water at the ocean floor in m / s
water_compressible:   true        # Whether the water column is vertically compressible
ray_resolution:       0.5         # Step size of ray parameter lookup table in degrees
filter_csv_path:      config/pacific_response.csv # Temporary: path to file containing water column filter taps
strain_coefficient:   3.5e-9      # Coupling coefficient from pressure to strain in 1 / Pa
